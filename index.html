<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>⛅ Weather App</h1>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name.." />
            <button id="searchBtn">Search</button>
        </div>
        <button id="locationBtn">📍 Use My Location</button>
        <div id="errorMsg" class="error hidden"></div>
        <div id="weatherCard" class="weather-card hidden">
            <h2 id="cityName"></h2>
            <p id="date"></p>
            <img id="weatherIcon" src="" alt="Weather icon" />
            <h3 id="temperature"></h3>
            <p id="description"></p>
            <div class="details">
                <div><span>💧 Humidity</span><span id="humidity"></span></div>
                <div><span>💨 Wind</span><span id="wind"></span></div>
                <div><span>🧭 Direction</span><span id="windDirection"></span></div>
                <div><span>🌡 Feels Like</span><span id="feelsLike"></span></div>
                <div><span>🌧 Rain</span><span id="rainChance"></span></div>
                <div><span>⛰ Altitude</span><span id="altitude"></span></div>
                <div><span>🔵 Air Pressure</span><span id="airPressure"></span></div>
                <div><span>🌅 Sunrise</span><span id="sunrise"></span></div>
                <div><span>🌇 Sunset</span><span id="sunset"></span></div>
            </div>
        </div>
        <div id="forecast" class="forecast"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
